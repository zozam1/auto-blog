name: Stock Blog Post

on:
  schedule:
    - cron: '0 1 * * 1,2,4'   # 월화목 오전 10시 (한국)
    - cron: '0 23 * * 3,5'    # 수금 오전 8시 (한국)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay
        run: sleep $((RANDOM % 1800))

      - name: Post Stock to Blogger
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          https://auto-blog-tawny-theta.vercel.app/api/stock
