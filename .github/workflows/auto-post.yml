name: Auto Blog Post

on:
  schedule:
    - cron: '0 7 * * 1,3,5'   # 월수금 오후 4시 (한국)
    - cron: '0 13 * * 2,4'    # 화목 오후 10시 (한국)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay
        run: sleep $((RANDOM % 1800))

      - name: Post to Blogger
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          https://auto-blog-tawny-theta.vercel.app/api/cron
