name: Auto Blog Post

on:
  schedule:
    - cron: '0 6 * * *'   # 한국 오후 3시
    - cron: '0 12 * * *'  # 한국 오후 9시
    - cron: '0 22 * * *'  # 한국 오전 7시
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Blogger
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          https://auto-blog-tawny-theta.vercel.app/api/cron
